<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b0b0b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  text-align:center;
  max-width:400px;
}

input {
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  background:#00ff99;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.small {
  font-size:12px;
  color:#aaa;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h1>Start Selling Today</h1>
<p>Enter your email to get instant access</p>

<input type="email" id="email" placeholder="Enter your email">

<button onclick="goNext()">Continue</button>

<p class="small">
No spam. Instant access. One-time purchase.
</p>
</div>

<script>
function goNext() {
  var email = document.getElementById("email").value;

  if(email === "") {
    alert("Enter your email");
    return;
  }

  // TEMP: just redirect
  window.location.href = "index.html";
}
</script>

</body>
</html>
